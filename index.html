<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Showcase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
    --accent: #7c6aff; --text: #e8e8f0; --muted: #444460; --muted2: #666688;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 40px 32px; }

  header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; }
  header span { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted2); }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; }
  .legend-item { display: flex; align-items: center; gap: 7px; background: #111118; border: 1px solid var(--border); border-radius: 5px; padding: 4px 9px; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted2); }
  .dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .c1{background:#ff9f43;} .c2{background:#48dbfb;} .c3{background:#ff6b9d;}
  .c4{background:#7c6aff;} .c5{background:#1dd1a1;} .c6{background:#feca57;} .c7{background:#ff6a6a;}

  /* Top-level scene block */
  .scene-block { margin-bottom: 72px; }
  .scene-title {
    font-size: 1.1rem; font-weight: 800; letter-spacing: -0.01em;
    color: var(--text); margin-bottom: 28px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; user-select: none;
  }
  .scene-title::after { content: ''; flex: 1; height: 2px; background: var(--border); }
  .scene-title .fold-icon {
    width: 20px; height: 20px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--muted2); font-size: 0.65rem; transition: transform 0.2s;
  }
  .scene-title .scene-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    padding: 3px 8px; border-radius: 3px; font-weight: 400; letter-spacing: 0.06em;
  }
  .scene-badge.modelled { background: #1a1a2e; color: #7c6aff; border: 1px solid #2e2e4e; }
  .scene-badge.captured { background: #1a2218; color: #1dd1a1; border: 1px solid #1e3a28; }
  .scene-block.collapsed .fold-icon { transform: rotate(-90deg); }
  .scene-body { overflow: hidden; transition: max-height 0.3s ease, opacity 0.25s ease; max-height: 99999px; opacity: 1; }
  .scene-block.collapsed .scene-body { max-height: 0; opacity: 0; }
  .scene-body-inner { padding-left: 16px; border-left: 2px solid var(--border); }

  .case-block { margin-bottom: 60px; }
  .case-title { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); font-family: 'JetBrains Mono', monospace; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
  .case-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .case-title .fold-icon { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 3px; color: var(--muted2); font-size: 0.6rem; transition: transform 0.2s; }
  .case-block.collapsed .fold-icon { transform: rotate(-90deg); }
  .case-body { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease; max-height: 9999px; opacity: 1; }
  .case-block.collapsed .case-body { max-height: 0; opacity: 0; }

  .subcase-block { margin-bottom: 24px; }
  .subcase-label { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--muted2); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .subcase-label .fold-icon { width: 13px; height: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 2px; color: var(--muted); font-size: 0.55rem; transition: transform 0.2s; }
  .subcase-block.collapsed .fold-icon { transform: rotate(-90deg); }
  .subcase-body { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease; max-height: 9999px; opacity: 1; }
  .subcase-block.collapsed .subcase-body { max-height: 0; opacity: 0; }

  .vid-rows { display: flex; flex-direction: column; gap: 8px; }
  .vid-row { display: flex; gap: 8px; align-items: flex-start; }

  .vid-cell { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .row-1 .vid-cell { max-width: calc(100% / 3); }

  .vid-label { display: flex; align-items: center; gap: 5px; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--muted2); white-space: nowrap; }
  .vid-tag { width: 16px; height: 16px; flex-shrink: 0; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 0.56rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .vid-tag.c1{background:#ff9f43;color:#000;} .vid-tag.c2{background:#48dbfb;color:#000;}
  .vid-tag.c3{background:#ff6b9d;color:#fff;} .vid-tag.c4{background:#7c6aff;color:#fff;}
  .vid-tag.c5{background:#1dd1a1;color:#000;} .vid-tag.c6{background:#feca57;color:#000;}
  .vid-tag.c7{background:#ff6a6a;color:#fff;}

  .video-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; aspect-ratio: 16/9; transition: border-color 0.2s; }
  .video-wrapper:hover { border-color: var(--accent); }
  .video-wrapper video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .video-wrapper.empty { display: flex; align-items: center; justify-content: center; }
  .video-wrapper.empty::after { content: '—'; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }

  /* ── Metrics table ── */
  .metrics-wrap {
    margin-bottom: 32px;
    overflow-x: auto;
  }
  .metrics-wrap table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
  }
  .metrics-wrap th {
    text-align: left;
    padding: 6px 12px;
    color: var(--muted2);
    border-bottom: 1px solid var(--border);
    font-weight: 400;
    white-space: nowrap;
  }
  .metrics-wrap th:not(:first-child) { text-align: right; }
  .metrics-wrap td {
    padding: 6px 12px;
    border-bottom: 0.5px solid #16161f;
    color: var(--text);
  }
  .metrics-wrap td:not(:first-child) { text-align: right; }
  .metrics-wrap tr:last-child td { border-bottom: none; }
  .metrics-wrap .method-cell { display: flex; align-items: center; gap: 6px; }
  .metrics-wrap .m-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .metrics-wrap .best { color: #1dd1a1; font-weight: 600; }
  .metrics-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted2);
    margin-top: 6px;
  }
</style>
</head>

function bestVal(data, key, higher) {
  const vals = data.map(m => m[key]);
  return higher ? Math.max(...vals) : Math.min(...vals);
}

let _tbodyCounter = 0;
function makeMetricsTable(data, noteText) {
  const wrap = document.createElement('div');
  wrap.className = 'metrics-wrap';
  wrap.style.marginBottom = '32px';

  const bestFlow = bestVal(data, 'flow', true);
  const bestL2d  = bestVal(data, 'l2d',  false);
  const bestL2f  = bestVal(data, 'l2f',  false);
  const bestDino = bestVal(data, 'dino', true);

  const tbodyId = 'metrics-tbody-' + (++_tbodyCounter);
  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th>Method</th>
        <th>Flow cos sim ↑</th>
        <th>L2 disocclusion ↓</th>
        <th>L2 full frame ↓</th>
        <th>DINO cos sim ↑</th>
      </tr>
    </thead>
    <tbody id="${tbodyId}"></tbody>
  `;
  wrap.appendChild(table);

  const note = document.createElement('p');
  note.className = 'metrics-note';
  note.textContent = noteText;
  wrap.appendChild(note);

  setTimeout(() => {
    const tbody = wrap.querySelector('#' + tbodyId);
    data.forEach(m => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="method-cell"><span class="m-dot" style="background:${m.color}"></span>${m.label}</span></td>
        <td class="${m.flow === bestFlow ? 'best' : ''}">${m.flow.toFixed(4)}</td>
        <td class="${m.l2d  === bestL2d  ? 'best' : ''}">${m.l2d.toFixed(4)}</td>
        <td class="${m.l2f  === bestL2f  ? 'best' : ''}">${m.l2f.toFixed(4)}</td>
        <td class="${m.dino === bestDino ? 'best' : ''}">${m.dino.toFixed(4)}</td>
      `;
      tbody.appendChild(tr);
    });
  }, 0);

  return wrap;
}

function makeCell(slot, base) {
  const cell = document.createElement('div');
  cell.className = 'vid-cell';
  const lbl = document.createElement('div');
  lbl.className = 'vid-label';
  lbl.innerHTML = `<span class="vid-tag ${slot.cls}">${slot.num}</span>${slot.label}`;
  cell.appendChild(lbl);
  const wrapper = document.createElement('div');
  wrapper.className = 'video-wrapper';
  const src = slot.src(base);
  if (src) {
    const vid = document.createElement('video');
    vid.src = src; vid.loop = true; vid.muted = true;
    vid.autoplay = true; vid.playsInline = true; vid.playbackRate = 1;
    wrapper.appendChild(vid);
  } else {
    wrapper.classList.add('empty');
  }
  cell.appendChild(wrapper);
  return cell;
}

function makeSubcase(sub) {
  const sc = document.createElement('div');
  sc.className = 'subcase-block';
  const lbl = document.createElement('div');
  lbl.className = 'subcase-label';
  lbl.innerHTML = `<span class="fold-icon">▾</span>${sub.id}.`;
  lbl.addEventListener('click', () => sc.classList.toggle('collapsed'));
  sc.appendChild(lbl);
  const body = document.createElement('div');
  body.className = 'subcase-body';
  const rows = document.createElement('div');
  rows.className = 'vid-rows';
  ROWS.forEach((slots, ri) => {
    const row = document.createElement('div');
    row.className = `vid-row row-${ri + 1}`;
    slots.forEach(slot => row.appendChild(makeCell(slot, sub.base)));
    rows.appendChild(row);
  });
  body.appendChild(rows);
  sc.appendChild(body);
  return sc;
}

function makeCase(c) {
  const block = document.createElement('div');
  block.className = 'case-block';
  const title = document.createElement('div');
  title.className = 'case-title';
  title.innerHTML = `<span class="fold-icon">▾</span>Case ${c.id}${c.name ? `<span style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:400;color:var(--muted2);letter-spacing:0.04em;text-transform:none;">${c.name}</span>` : ''}`;
  title.addEventListener('click', () => block.classList.toggle('collapsed'));
  block.appendChild(title);
  const body = document.createElement('div');
  body.className = 'case-body';
  c.subcases.forEach(sub => body.appendChild(makeSubcase(sub)));
  block.appendChild(body);
  return block;
}

function makeScene(scene) {
  const block = document.createElement('div');
  block.className = 'scene-block';

  const title = document.createElement('div');
  title.className = 'scene-title';
  title.innerHTML = `<span class="fold-icon">▾</span>${scene.label}<span class="scene-badge ${scene.id}">${scene.id}</span>`;
  title.addEventListener('click', () => block.classList.toggle('collapsed'));
  block.appendChild(title);

  const body = document.createElement('div');
  body.className = 'scene-body';
  const inner = document.createElement('div');
  inner.className = 'scene-body-inner';

  // Insert metrics table under each scene
  if (scene.id === 'modelled') {
    inner.appendChild(makeMetricsTable(METRICS, '↑ higher is better · ↓ lower is better · averaged across 8 modelled scenes'));
  }
  if (scene.id === 'captured') {
    inner.appendChild(makeMetricsTable(METRICS_CAPTURED, '↑ higher is better · ↓ lower is better · averaged across 2 captured scenes'));
  }

  scene.cases.forEach(c => inner.appendChild(makeCase(c)));
  body.appendChild(inner);
  block.appendChild(body);
  return block;
}

const root = document.getElementById('root');
SCENES.forEach(scene => root.appendChild(makeScene(scene)));
</script>
</body>
</html>
